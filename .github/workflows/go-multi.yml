name: Go Multi-Platform

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install dependencies
        run: go mod download

      ## Here we only run tests cases that require multi-platform testing
      ## We SHOULD NOT bloat this by running all tests

      - name: Test keychain package
        run: go test -v ./keychain/...
